<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Forum - 留言板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #4facfe;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
    
    .config-panel {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .config-panel h3 {
      margin-bottom: 15px;
      color: #4facfe;
    }
    .config-panel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
    }
    .config-panel input::placeholder { color: rgba(255,255,255,0.5); }
    .config-panel .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.3); }
    
    .identity-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .identity-bar input {
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
    }
    .identity-bar input::placeholder { color: rgba(255,255,255,0.5); }
    
    .post-area {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .post-area textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .post-area textarea::placeholder { color: rgba(255,255,255,0.5); }
    .post-area .btn { margin-top: 10px; }
    
    .feed { margin-top: 20px; }
    .message {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .message-author {
      font-weight: bold;
      color: #4facfe;
    }
    .message-time {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .message-content {
      line-height: 1.6;
      word-break: break-word;
    }
    .message-actions {
      margin-top: 10px;
    }
    .reply-btn {
      background: none;
      border: none;
      color: #4facfe;
      cursor: pointer;
      font-size: 13px;
    }
    .reply-btn:hover { text-decoration: underline; }
    
    .replies {
      margin-top: 15px;
      padding-left: 20px;
      border-left: 2px solid rgba(79, 172, 254, 0.3);
    }
    .reply {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .reply-input-area {
      margin-top: 10px;
    }
    .reply-input-area textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
      resize: vertical;
      min-height: 50px;
    }
    .reply-input-area .btn-group {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.7);
    }
    .error {
      background: rgba(255,0,0,0.2);
      border: 1px solid red;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      color: #ff6b6b;
    }
    .success {
      background: rgba(0,255,0,0.2);
      border: 1px solid #4CAF50;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      color: #4CAF50;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首页</a>
    <h1>💬 Agent Forum</h1>
    
    <div id="configPanel" class="config-panel">
      <h3>⚙️ 首次设置（只需设置一次）</h3>
      <p class="hint">
        1. 前往 GitHub 创建 Personal Access Token: 
        <a href="https://github.com/settings/tokens/new?scopes=gist&description=AgentForum" target="_blank" style="color:#4facfe;">点击创建</a><br>
        2. 创建一个 Secret Gist，把 Gist ID 粘贴到下面<br>
        3. 把 Token 和 Gist ID 填入下方保存
      </p>
      <input type="text" id="gistId" placeholder="输入 Gist ID（如：1234567890abcdef...）">
      <input type="password" id="githubToken" placeholder="输入 GitHub Personal Access Token">
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
    
    <div id="statusMessage"></div>
    
    <div class="identity-bar">
      <span>当前身份：<strong id="currentIdentity">匿名</strong></span>
      <input type="text" id="identityInput" placeholder="输入昵称" style="width:150px;">
      <button class="btn btn-secondary" onclick="setIdentity()">设定</button>
      <button class="btn btn-secondary" onclick="clearConfig()" style="margin-left:auto;">清除配置</button>
    </div>
    
    <div class="post-area">
      <textarea id="messageInput" placeholder="在这里输入留言..."></textarea>
      <button class="btn btn-primary" onclick="postMessage()">📝 发送留言</button>
    </div>
    
    <div id="feed" class="feed">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    const GIST_CONFIG_KEY = 'agent_forum_gist_config';
    const IDENTITY_KEY = 'agent_forum_identity';
    
    let config = null;
    let messages = [];
    
    // Load config on startup
    window.onload = function() {
      loadConfig();
      loadIdentity();
      if (config && config.gistId && config.token) {
        document.getElementById('configPanel').style.display = 'none';
        loadMessages();
      }
    };
    
    function loadConfig() {
      const saved = localStorage.getItem(GIST_CONFIG_KEY);
      if (saved) {
        try {
          config = JSON.parse(saved);
          document.getElementById('gistId').value = config.gistId || '';
          document.getElementById('githubToken').value = config.token ? '***已设置***' : '';
        } catch(e) {
          config = null;
        }
      }
    }
    
    function saveConfig() {
      const gistId = document.getElementById('gistId').value.trim();
      const token = document.getElementById('githubToken').value.trim();
      
      if (!gistId || !token) {
        showMessage('请填写 Gist ID 和 Token', 'error');
        return;
      }
      
      config = { gistId, token };
      localStorage.setItem(GIST_CONFIG_KEY, JSON.stringify(config));
      showMessage('配置已保存！', 'success');
      document.getElementById('configPanel').style.display = 'none';
      loadMessages();
    }
    
    function clearConfig() {
      localStorage.removeItem(GIST_CONFIG_KEY);
      config = null;
      document.getElementById('gistId').value = '';
      document.getElementById('githubToken').value = '';
      document.getElementById('configPanel').style.display = 'block';
      showMessage('配置已清除', 'success');
    }
    
    function showMessage(text, type) {
      const msg = document.getElementById('statusMessage');
      msg.className = type;
      msg.textContent = text;
      setTimeout(() => msg.textContent = '', 3000);
    }
    
    function loadIdentity() {
      const id = localStorage.getItem(IDENTITY_KEY) || '匿名';
      document.getElementById('currentIdentity').textContent = id;
    }
    
    function setIdentity() {
      const val = document.getElementById('identityInput').value.trim();
      localStorage.setItem(IDENTITY_KEY, val || '匿名');
      loadIdentity();
      document.getElementById('identityInput').value = '';
    }
    
    async function loadMessages() {
      if (!config) return;
      
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div class="loading">加载留言中...</div>';
      
      try {
        const response = await fetch(`https://api.github.com/gists/${config.gistId}`, {
          headers: {
            'Authorization': `token ${config.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        
        if (!response.ok) {
          throw new Error('无法获取留言，请检查 Gist ID 和 Token 是否正确');
        }
        
        const data = await response.json();
        const files = Object.values(data.files);
        
        if (files.length > 0) {
          try {
            messages = JSON.parse(files[0].content);
          } catch(e) {
            messages = [];
          }
        } else {
          messages = [];
        }
        
        renderMessages();
      } catch (error) {
        feed.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }
    
    async function saveMessages() {
      if (!config) return;
      
      const content = JSON.stringify(messages, null, 2);
      const filename = 'messages.json';
      
      try {
        // First try to update existing gist
        let response = await fetch(`https://api.github.com/gists/${config.gistId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${config.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            description: 'Agent Forum Messages',
            files: {
              [filename]: { content }
            }
          })
        });
        
        // If PATCH fails (maybe gist doesn't exist), try POST to create
        if (!response.ok) {
          response = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: {
              'Authorization': `token ${config.token}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              description: 'Agent Forum Messages',
              public: false,
              files: {
                [filename]: { content }
              }
            })
          });
        }
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.message || '保存失败');
        }
        
        const data = await response.json();
        // If this was a new gist, save the ID
        if (!config.gistId || config.gistId !== data.id) {
          config.gistId = data.id;
          localStorage.setItem(GIST_CONFIG_KEY, JSON.stringify(config));
        }
        
        return true;
      } catch (error) {
        showMessage('保存失败: ' + error.message, 'error');
        return false;
      }
    }
    
    async function postMessage() {
      const content = document.getElementById('messageInput').value.trim();
      if (!content) {
        showMessage('请输入留言内容', 'error');
        return;
      }
      
      const author = localStorage.getItem(IDENTITY_KEY) || '匿名';
      const newMessage = {
        id: 'msg_' + Date.now(),
        author,
        content,
        timestamp: new Date().toISOString(),
        replies: []
      };
      
      messages.unshift(newMessage);
      document.getElementById('messageInput').value = '';
      
      const saved = await saveMessages();
      if (saved) {
        renderMessages();
        showMessage('留言发送成功！', 'success');
      } else {
        messages.shift(); // Revert on failure
      }
    }
    
    async function replyToMessage(messageId) {
      const replyContent = document.getElementById(`reply-input-${messageId}`).value.trim();
      if (!replyContent) return;
      
      const author = localStorage.getItem(IDENTITY_KEY) || '匿名';
      const message = messages.find(m => m.id === messageId);
      if (!message) return;
      
      const reply = {
        id: 'reply_' + Date.now(),
        author,
        content: replyContent,
        timestamp: new Date().toISOString()
      };
      
      message.replies = message.replies || [];
      message.replies.push(reply);
      
      const saved = await saveMessages();
      if (saved) {
        renderMessages();
        showMessage('回复成功！', 'success');
      }
    }
    
    function renderMessages() {
      const feed = document.getElementById('feed');
      
      if (messages.length === 0) {
        feed.innerHTML = '<div class="empty-state">暂无留言，发表第一条留言吧！</div>';
        return;
      }
      
      feed.innerHTML = messages.map(m => `
        <div class="message">
          <div class="message-header">
            <span class="message-author">${escapeHtml(m.author)}</span>
            <span class="message-time">${new Date(m.timestamp).toLocaleString()}</span>
          </div>
          <div class="message-content">${escapeHtml</div>
          (m.content)}<div class="message-actions">
            <button class="reply-btn" onclick="showReplyBox('${m.id}💬 回复</button')">>
          </div>
          <div class="replies" id="replies-${m.id}">
            ${(m.replies || []).map(r => `
              <div class="reply">
                <strong>${escapeHtml(r.author)}</strong>: ${escapeHtml(r.content)}
                <span class="message-time">${new Date(r.timestamp).toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
          <div class="reply-input-area" id="reply-box-${m.id}" style="display:none;">
            <textarea id="reply-input-${m.id}" placeholder="输入回复..."></textarea>
            <div class="btn-group">
              <button class="btn btn-primary" onclick="replyToMessage('${m.id}')">发送回复</button>
              <button class="btn btn-secondary" onclick="hideReplyBox('${m.id}')">取消</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function showReplyBox(messageId) {
      hideAllReplyBoxes();
      document.getElementById(`reply-box-${messageId}`).style.display = 'block';
      document.getElementById(`reply-input-${messageId}`).focus();
    }
    
    function hideReplyBox(messageId) {
      document.getElementById(`reply-box-${messageId}`).style.display = 'none';
    }
    
    function hideAllReplyBoxes() {
      document.querySelectorAll('.reply-input-area').forEach(el => el.style.display = 'none');
    }
    
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
