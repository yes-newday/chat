<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易留言板</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f6f6; color:#333; }
    .wrap { max-width: 720px; margin: 40px auto; padding: 16px; background:white; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
    h1 { margin:0 0 12px; font-size:28px; }
    .identity { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
    input, textarea { width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; font-size:14px; box-sizing:border-box; }
    textarea { resize: vertical; min-height:60px; }
    .btn { padding:8px 12px; border:none; background:#4CAF50; color:white; border-radius:4px; cursor:pointer; }
    .btn:hover { background:#45a049; }
    .btn.small { padding:4px 8px; font-size:12px; }
    .feed { margin-top:16px; }
    .message { border-top:1px solid #eee; padding:12px 0; }
    .m-head { font-weight: bold; }
    .muted { color:#888; font-size:12px; margin-left:6px; }
    .m-body { margin:6px 0; word-break:break-word; }
    .reply { padding-left:16px; border-left:2px solid #eee; margin-top:6px; }
    .replies { margin-top:6px; }
    .m-actions { margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>简易留言板</h1>

    <div class="identity">
      <span>当前身份：<strong id="currentIdentity">匿名</strong></span>
      <input id="identityInput" placeholder="输入新的昵称" style="width:180px;">
      <button class="btn" id="setIdentityBtn">设定</button>
    </div>

    <div style="margin-bottom:12px;">
      <textarea id="messageInput" placeholder="在这里输入留言..."></textarea>
      <button class="btn" id="postBtn" style="margin-top:6px;">发送留言</button>
    </div>

    <div id="feed" class="feed"></div>
  </div>

  <script>
  (function(){
    const STORAGE_KEY = 'simple_board_messages_v1';
    const IDENTITY_KEY = 'simple_board_identity';

    function loadIdentity(){
      const id = localStorage.getItem(IDENTITY_KEY) || '匿名';
      document.getElementById('currentIdentity').textContent = id;
      document.getElementById('identityInput').value = '';
    }
    function setIdentity(){
      const val = document.getElementById('identityInput').value.trim();
      if (val) {
        localStorage.setItem(IDENTITY_KEY, val);
      } else {
        localStorage.setItem(IDENTITY_KEY, '匿名');
      }
      loadIdentity();
      renderFeed();
    }
    function getMessages(){
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch(e){
        return [];
      }
    }
    function saveMessages(msgs){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
    }
    function renderFeed(){
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      const msgs = getMessages();
      if(msgs.length === 0){
        feed.innerHTML = '<p style="color:#888;text-align:center;">暂无留言，发表第一条留言吧！</p>';
        return;
      }
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
          <div class="m-head">
            <span class="author">${escapeHtml(m.author)}</span>
            <span class="muted">${new Date(m.timestamp).toLocaleString()}</span>
          </div>
          <div class="m-body">${escapeHtml(m.content)}</div>
          <div class="m-actions">
            <button class="btn small replyBtn" data-id="${m.id}">回复</button>
          </div>
          <div class="replies" id="replies-${m.id}"></div>
        `;
        feed.appendChild(div);
        renderReplies(div.querySelector('.replies'), m.replies || []);
        const replyBtn = div.querySelector('.replyBtn');
        if (replyBtn){
          replyBtn.addEventListener('click', () => showReplyBox(m.id));
        }
      });
    }
    function renderReplies(container, replies){
      container.innerHTML = '';
      if(!replies || replies.length === 0) return;
      replies.forEach(r => {
        const rDiv = document.createElement('div');
        rDiv.className = 'reply';
        rDiv.innerHTML = `<strong>${escapeHtml(r.author)}</strong> <span class="muted">${new Date(r.timestamp).toLocaleString()}</span>: ${escapeHtml(r.content)}`;
        container.appendChild(rDiv);
      });
    }
    function showReplyBox(postId){
      let existing = document.getElementById('replyBox-' + postId);
      if (existing){
        existing.remove();
        return;
      }
      const container = document.getElementById('replies-' + postId);
      const box = document.createElement('div');
      box.id = 'replyBox-' + postId;
      box.style.marginTop = '8px';
      box.innerHTML = `
        <textarea id="replyInput-${postId}" placeholder="输入回复..." rows="2" style="width:100%;"></textarea><br/>
        <button class="btn small sendReply" data-id="${postId}" style="margin-top:4px;">发送</button>
      `;
      container.appendChild(box);
      box.querySelector('.sendReply').addEventListener('click', () => {
        const content = box.querySelector('textarea').value.trim();
        if (!content) return;
        addReply(postId, content);
        box.remove();
        renderFeed();
      });
    }
    function addReply(postId, content){
      const identity = localStorage.getItem(IDENTITY_KEY) || '匿名';
      const msgs = getMessages();
      const post = msgs.find(p => p.id === postId);
      if (!post) return;
      post.replies = post.replies || [];
      post.replies.push(reply);
      saveMessages(msgs);
    }
    function addPost(){
      const author = localStorage.getItem(IDENTITY_KEY) || '匿名';
      const content = document.getElementById('messageInput').value.trim();
      if (!content) return alert('请输入留言内容');
      const newPost = { id: 'post_' + Date.now(), author, content, timestamp: Date.now(), replies: [] };
      const msgs = getMessages();
      msgs.unshift(newPost);
      saveMessages(msgs);
      document.getElementById('messageInput').value = '';
      renderFeed();
    }
    function escapeHtml(str){
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('setIdentityBtn').addEventListener('click', setIdentity);
    document.getElementById('postBtn').addEventListener('click', addPost);
    document.getElementById('messageInput').addEventListener('keydown', function(e){
      if(e.ctrlKey && e.key === 'Enter') addPost();
    });

    loadIdentity();
    renderFeed();
  })();
  </script>
</body>
</html>
