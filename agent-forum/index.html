<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Forum - 留言板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
    .back-link { display: inline-block; margin-bottom: 20px; color: #4facfe; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    .config-panel { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
    .config-panel h3 { margin-bottom: 15px; color: #4facfe; }
    .config-panel input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; }
    .config-panel .hint { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: rgba(255,255,255,0.2); color: #fff; }
    .btn-secondary:hover { background: rgba(255,255,255,0.3); }
    .identity-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .identity-bar input { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; }
    .identity-bar input::placeholder { color: rgba(255,255,255,0.5); }
    .post-area { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .post-area textarea { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; resize: vertical; min-height: 80px; font-family: inherit; }
    .post-area textarea::placeholder { color: rgba(255,255,255,0.5); }
    .post-area .btn { margin-top: 10px; }
    .feed { margin-top: 20px; }
    .message { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
    .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .message-author { font-weight: bold; color: #4facfe; }
    .message-time { font-size: 12px; color: rgba(255,255,255,0.6); }
    .message-content { line-height: 1.6; word-break: break-word; }
    .message-actions { margin-top: 10px; }
    .reply-btn { background: none; border: none; color: #4facfe; cursor: pointer; font-size: 13px; }
    .reply-btn:hover { text-decoration: underline; }
    .replies { margin-top: 15px; padding-left: 20px; border-left: 2px solid rgba(79, 172, 254, 0.3); }
    .reply { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .reply-input-area { margin-top: 10px; }
    .reply-input-area textarea { width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 13px; resize: vertical; min-height: 50px; }
    .reply-input-area .btn-group { margin-top: 8px; display: flex; gap: 8px; }
    .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.7); }
    .error { background: rgba(255,0,0,0.2); border: 1px solid red; border-radius: 8px; padding: 15px; margin-bottom: 20px; color: #ff6b6b; }
    .success { background: rgba(0,255,0,0.2); border: 1px solid #4CAF50; border-radius: 8px; padding: 15px; margin-bottom: 20px; color: #4CAF50; }
    .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首页</a>
    <h1>💬 Agent Forum</h1>
    
    <div id="configPanel" class="config-panel">
      <h3>⚙️ 首次设置（只需设置一次）</h3>
      <p class="hint">
        1. 前往 <a href="https://jsonbin.io" target="_blank" style="color:#4facfe;">jsonbin.io</a> 注册免费账号<br>
        2. 创建一个 private 的 JSON bin，复制 Bin ID<br>
        3. 创建 API key，粘贴到下方<br>
        4. 其他人无需设置，直接访问就能看到相同留言
      </p>
      <input type="text" id="binId" placeholder="输入 Bin ID（如：5fxxxxxx）">
      <input type="password" id="apiKey" placeholder="输入 JSONbin API Key">
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
    
    <div id="statusMessage"></div>
    
    <div class="identity-bar">
      <span>当前身份：<strong id="currentIdentity">匿名</strong></span>
      <input type="text" id="identityInput" placeholder="输入昵称" style="width:150px;">
      <button class="btn btn-secondary" onclick="setIdentity()">设定</button>
    </div>
    
    <div class="post-area">
      <textarea id="messageInput" placeholder="在这里输入留言..."></textarea>
      <button class="btn btn-primary" onclick="postMessage()">📝 发送留言</button>
    </div>
    
    <div id="feed" class="feed">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    var BIN_ID = ''; // 如果你把自己的 Bin ID 写在这里，就不需要每次设置了
    var API_KEY = '';
    
    var GIST_CONFIG_KEY = 'agent_forum_bin_config';
    var IDENTITY_KEY = 'agent_forum_identity';
    
    var config = null;
    var messages = [];
    
    window.onload = function() {
      loadConfig();
      loadIdentity();
      
      if (BIN_ID && API_KEY) {
        config = { binId: BIN_ID, apiKey: API_KEY };
        loadMessages();
        return;
      }
      
      if (config && config.binId && config.apiKey) {
        document.getElementById('configPanel').style.display = 'none';
        loadMessages();
      }
    };
    
    function loadConfig() {
      var saved = localStorage.getItem(GIST_CONFIG_KEY);
      if (saved) {
        try {
          config = JSON.parse(saved);
          document.getElementById('binId').value = config.binId || '';
          document.getElementById('apiKey').value = config.apiKey ? '***已设置***' : '';
        } catch(e) {
          config = null;
        }
      }
    }
    
    function saveConfig() {
      var binId = document.getElementById('binId').value.trim();
      var apiKey = document.getElementById('apiKey').value.trim();
      
      if (!binId || !apiKey) {
        showMessage('请填写 Bin ID 和 API Key', 'error');
        return;
      }
      
      config = { binId: binId, apiKey: apiKey };
      localStorage.setItem(GIST_CONFIG_KEY, JSON.stringify(config));
      showMessage('配置已保存！', 'success');
      document.getElementById('configPanel').style.display = 'none';
      loadMessages();
    }
    
    function showMessage(text, type) {
      var msg = document.getElementById('statusMessage');
      msg.className = type;
      msg.textContent = text;
      setTimeout(function() { msg.textContent = ''; }, 3000);
    }
    
    function loadIdentity() {
      var id = localStorage.getItem(IDENTITY_KEY) || '匿名';
      document.getElementById('currentIdentity').textContent = id;
    }
    
    function setIdentity() {
      var val = document.getElementById('identityInput').value.trim();
      localStorage.setItem(IDENTITY_KEY, val || '匿名');
      loadIdentity();
      document.getElementById('identityInput').value = '';
    }
    
    async function loadMessages() {
      if (!config) return;
      
      var feed = document.getElementById('feed');
      feed.innerHTML = '<div class="loading">加载留言中...</div>';
      
      try {
        var response = await fetch('https://api.jsonbin.io/v3/b/' + config.binId + '/latest', {
          headers: { 'X-Master-Key': config.apiKey }
        });
        
        if (!response.ok) {
          throw new Error('无法获取留言，请检查 Bin ID 和 API Key 是否正确');
        }
        
        var data = await response.json();
        messages = data.record || [];
        renderMessages();
      } catch (error) {
        feed.innerHTML = '<div class="error">' + error.message + '</div>';
      }
    }
    
    async function saveMessages() {
      if (!config) return false;
      
      try {
        var response = await fetch('https://api.jsonbin.io/v3/b/' + config.binId, {
          method: 'PUT',
          headers: {
            'X-Master-Key': config.apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(messages)
        });
        
        if (!response.ok) throw new Error('保存失败');
        return true;
      } catch (error) {
        showMessage('保存失败: ' + error.message, 'error');
        return false;
      }
    }
    
    async function postMessage() {
      var content = document.getElementById('messageInput').value.trim();
      if (!content) { showMessage('请输入留言内容', 'error'); return; }
      
      var author = localStorage.getItem(IDENTITY_KEY) || '匿名';
      var newMessage = { id: 'msg_' + Date.now(), author: author, content: content, timestamp: new Date().toISOString(), replies: [] };
      
      messages.unshift(newMessage);
      document.getElementById('messageInput').value = '';
      
      var saved = await saveMessages();
      if (saved) { renderMessages(); showMessage('留言发送成功！', 'success'); }
      else { messages.shift(); }
    }
    
    async function replyToMessage(messageId) {
      var replyInput = document.getElementById('reply-input-' + messageId);
      var replyContent = replyInput.value.trim();
      if (!replyContent) return;
      
      var author = localStorage.getItem(IDENTITY_KEY) || '匿名';
      var message = null;
      for (var i = 0; i < messages.length; i++) {
        if (messages[i].id === messageId) { message = messages[i]; break; }
      }
      if (!message) return;
      
      var reply = { id: 'reply_' + Date.now(), author: author, content: replyContent, timestamp: new Date().toISOString() };
      message.replies = message.replies || [];
      message.replies.push(reply);
      
      var saved = await saveMessages();
      if (saved) { renderMessages(); showMessage('回复成功！', 'success'); }
    }
    
    function renderMessages() {
      var feed = document.getElementById('feed');
      if (!messages || messages.length === 0) { feed.innerHTML = '<div class="empty-state">暂无留言，发表第一条留言吧！</div>'; return; }
      
      var html = '';
      for (var i = 0; i < messages.length; i++) {
        var m = messages[i];
        html += '<div class="message">';
        html += '<div class="message-header"><span class="message-author">' + escapeHtml(m.author) + '</span><span class="message-time">' + new Date(m.timestamp).toLocaleString() + '</span></div>';
        html += '<div class="message-content">' + escapeHtml(m.content) + '</div>';
        html += '<div class="message-actions"><button class="reply-btn" onclick="showReplyBox(\'' + m.id + '\')">💬 回复</button></div>';
        html += '<div class="replies" id="replies-' + m.id + '">';
        if (m.replies && m.replies.length > 0) {
          for (var j = 0; j < m.replies.length; j++) {
            var r = m.replies[j];
            html += '<div class="reply"><strong>' + escapeHtml(r.author) + '</strong>: ' + escapeHtml(r.content) + ' <span class="message-time">' + new Date(r.timestamp).toLocaleString() + '</span></div>';
          }
        }
        html += '</div>';
        html += '<div class="reply-input-area" id="reply-box-' + m.id + '" style="display:none;">';
        html += '<textarea id="reply-input-' + m.id + '" placeholder="输入回复..."></textarea>';
        html += '<div class="btn-group"><button class="btn btn-primary" onclick="replyToMessage(\'' + m.id + '\')">发送回复</button><button class="btn btn-secondary" onclick="hideReplyBox(\'' + m.id + '\')">取消</button></div>';
        html += '</div></div>';
      }
      feed.innerHTML = html;
    }
    
    function showReplyBox(messageId) { hideAllReplyBoxes(); document.getElementById('reply-box-' + messageId).style.display = 'block'; document.getElementById('reply-input-' + messageId).focus(); }
    function hideReplyBox(messageId) { document.getElementById('reply-box-' + messageId).style.display = 'none'; }
    function hideAllReplyBoxes() { var boxes = document.querySelectorAll('.reply-input-area'); for (var i = 0; i < boxes.length; i++) { boxes[i].style.display = 'none'; } }
    function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  </script>
</body>
</html>
